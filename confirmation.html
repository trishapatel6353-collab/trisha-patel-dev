<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Order Confirmed</title>
<link rel="stylesheet" href="style.css">
<style>
  body { padding-bottom: 32px; background: #fafafa; }
  .hero {
    background: #0f0f0f; color: #fff;
    padding: 52px 24px 40px;
    text-align: center;
  }
  .check-ring {
    width: 72px; height: 72px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 20px;
    animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }
  .hero h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .hero p { color: #888; font-size: 14px; margin-top: 6px; }
  .eta-pill {
    display: inline-flex; align-items: center; gap: 6px;
    background: #1e1e1e; border-radius: 30px;
    padding: 8px 18px; font-size: 13px; font-weight: 600;
    margin-top: 18px; color: #ccc;
  }
  .summary-card {
    background: #fff; border: 1px solid #e8e8e8;
    border-radius: 18px; margin: 20px;
    overflow: hidden;
  }
  .summary-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 18px; border-bottom: 1px solid #f5f5f5;
  }
  .summary-row:last-child { border-bottom: none; }
  .row-icon { font-size: 16px; min-width: 22px; margin-top: 1px; }
  .row-label { font-size: 11px; color: #aaa; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
  .row-val { font-size: 14px; font-weight: 600; }
  .items-list { font-size: 13px; color: #555; line-height: 1.8; }
  .actions { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
</style>
</head>
<body>

<div class="hero">
  <div class="check-ring">✓</div>
  <h1>Order placed!</h1>
  <p>Thank you for ordering from QuickBite</p>
  <div class="eta-pill">🚀 Estimated delivery: 30–45 mins</div>
</div>

<div class="summary-card" id="summary"></div>

<div class="actions">
  <a class="btn-primary" href="menu.html">Order again</a>
  <a class="btn-secondary" href="history.html">View all orders</a>
</div>

<script>
const order = JSON.parse(localStorage.getItem('qb_lastOrder')||'{}');
const s = document.getElementById('summary');
if(order.total) {
  s.innerHTML = `
    <div class="summary-row"><span class="row-icon">📍</span><div><div class="row-label">Delivery address</div><div class="row-val">${order.address}</div></div></div>
    <div class="summary-row"><span class="row-icon">💳</span><div><div class="row-label">Payment</div><div class="row-val">${order.payment}</div></div></div>
    <div class="summary-row"><span class="row-icon">🍽</span><div><div class="row-label">Items</div><div class="items-list">${(order.items||[]).map(i=>`${i.emoji} ${i.name} × ${i.qty}`).join('<br>')}</div></div></div>
    <div class="summary-row"><span class="row-icon">💰</span><div><div class="row-label">Total paid</div><div class="row-val" style="font-size:18px;font-weight:800">₹${order.total}</div></div></div>`;
} else {
  s.innerHTML = '<div style="padding:24px;text-align:center;color:#aaa">No order details found.</div>';
}
</script>
</body>
</html>
