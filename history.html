<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Order History</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #212121; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
  .topbar { background: #FFC107; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .back-btn { background: #212121; color: #FFC107; border: none; border-radius: 8px; padding: 6px 12px; font-size: 18px; cursor: pointer; text-decoration: none; }
  .topbar h1 { color: #212121; font-size: 20px; font-weight: 900; }
  .section { padding: 16px; }
  .order-card {
    background: #2c2c2c; border-radius: 16px; padding: 16px;
    margin-bottom: 14px; border-left: 4px solid #FFC107;
  }
  .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-id { color: #FFC107; font-size: 13px; font-weight: 800; }
  .order-date { color: #888; font-size: 11px; }
  .order-status { background: #FFC107; color: #212121; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .order-items { color: #ccc; font-size: 13px; line-height: 1.7; }
  .order-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid #3a3a3a; }
  .order-pay { color: #888; font-size: 12px; }
  .order-total { color: #FFC107; font-size: 18px; font-weight: 900; }
  .empty-state { text-align: center; padding: 80px 20px; }
  .empty-state .big { font-size: 60px; }
  .empty-state p { color: #aaa; margin-top: 14px; font-size: 15px; }
  .empty-state a { display: inline-block; margin-top: 18px; background: #FFC107; color: #212121; font-weight: 800; padding: 12px 28px; border-radius: 12px; text-decoration: none; }
  .bottombar { position: fixed; bottom: 0; left: 0; right: 0; background: #FFC107; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
  .bottombar a { text-decoration: none; color: #212121; font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bottombar a span { font-size: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="menu.html">←</a>
  <h1>📋 Order History</h1>
</div>

<div class="section" id="history-content"></div>

<div class="bottombar">
  <a href="menu.html"><span>🍽</span>Menu</a>
  <a href="cart.html"><span>🛒</span>Cart</a>
  <a href="history.html"><span>📋</span>Orders</a>
  <a href="profile.html"><span>👤</span>Profile</a>
</div>

<script>
const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
const container = document.getElementById('history-content');

if (history.length === 0) {
  container.innerHTML = `
    <div class="empty-state">
      <div class="big">📋</div>
      <p>No orders yet!<br>Place your first order.</p>
      <a href="menu.html">Order Now</a>
    </div>`;
} else {
  container.innerHTML = history.map((order, i) => `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-id">Order #${String(i + 1).padStart(3, '0')}</div>
          <div class="order-date">${order.date}</div>
        </div>
        <span class="order-status">Delivered ✅</span>
      </div>
      <div class="order-items">
        ${order.items.map(it => `${it.emoji} ${it.name} × ${it.qty}`).join('<br>')}
      </div>
      <div class="order-footer">
        <span class="order-pay">💳 ${order.payment}</span>
        <span class="order-total">₹${order.total}</span>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
