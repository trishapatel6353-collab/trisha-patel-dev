<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Orders</title>
<link rel="stylesheet" href="style.css">
<style>
  .order-card {
    background: #fff; border: 1px solid #e8e8e8;
    border-radius: 16px; overflow: hidden; margin-bottom: 12px;
  }
  .order-head {
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid #f5f5f5;
  }
  .order-num { font-size: 13px; font-weight: 800; }
  .order-date { font-size: 11px; color: #aaa; margin-top: 2px; }
  .status-pill {
    background: #f5f5f5; color: #555;
    border-radius: 20px; padding: 4px 12px;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.3px;
  }
  .order-body { padding: 12px 16px; }
  .order-items { font-size: 13px; color: #555; line-height: 1.8; margin-bottom: 10px; }
  .order-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 1px solid #f5f5f5;
  }
  .order-pay { font-size: 12px; color: #aaa; }
  .order-total { font-size: 18px; font-weight: 800; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="menu.html">←</a>
  <h1>Your orders</h1>
  <div></div>
</div>

<div class="section" id="history-content"></div>

<div class="bottomnav">
  <a href="menu.html"><span class="nav-icon">🍽</span>Menu</a>
  <a href="cart.html"><span class="nav-icon">🛒</span>Cart</a>
  <a href="history.html" class="active"><span class="nav-icon">📋</span>Orders</a>
  <a href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
const history = JSON.parse(localStorage.getItem('qb_history')||'[]');
const c = document.getElementById('history-content');
if(!history.length) {
  c.innerHTML = `<div class="empty-state">
    <div class="empty-icon">📋</div>
    <h3>No orders yet</h3>
    <p>Your order history will appear here</p>
    <a class="btn-primary" href="menu.html" style="max-width:180px;margin:0 auto">Order now</a>
  </div>`;
} else {
  c.innerHTML = history.map((o,i) => `
    <div class="order-card">
      <div class="order-head">
        <div>
          <div class="order-num">Order #${String(history.length - i).padStart(3,'0')}</div>
          <div class="order-date">${o.date}</div>
        </div>
        <span class="status-pill">Delivered</span>
      </div>
      <div class="order-body">
        <div class="order-items">${o.items.map(it=>`${it.emoji} ${it.name} × ${it.qty}`).join('<br>')}</div>
        <div class="order-foot">
          <span class="order-pay">${o.payment}</span>
          <span class="order-total">₹${o.total}</span>
        </div>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
