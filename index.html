<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', -apple-system, sans-serif;
    overflow: hidden;
  }
  .logo-mark {
    width: 72px; height: 72px;
    background: #fff;
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    animation: appear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .name {
    color: #fff;
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    margin-top: 18px;
    animation: rise 0.5s 0.2s ease both;
  }
  .tagline {
    color: #555;
    font-size: 14px;
    margin-top: 8px;
    letter-spacing: 0.5px;
    animation: rise 0.5s 0.35s ease both;
  }
  .progress {
    margin-top: 60px;
    width: 40px; height: 2px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
    animation: rise 0.3s 0.5s ease both;
  }
  .progress-fill {
    height: 100%; width: 0;
    background: #fff;
    animation: fill 2s 0.5s ease forwards;
  }
  @keyframes appear {
    from { opacity: 0; transform: scale(0.6); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fill { from { width: 0; } to { width: 100%; } }
</style>
</head>
<body>
<div class="logo-mark">⚡</div>
<div class="name">QuickBite</div>
<div class="tagline">Order fast. Eat happy.</div>
<div class="progress"><div class="progress-fill"></div></div>
<script>setTimeout(() => { window.location.href = 'login.html'; }, 2600);</script>
</body>
</html>
