<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #212121;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .logo { font-size: 80px; animation: bounce 1s infinite alternate; }
  .name {
    font-size: 42px; font-weight: 900; color: #FFC107;
    letter-spacing: 2px; margin-top: 12px;
    animation: fadein 0.8s ease;
  }
  .tagline {
    color: #fff; font-size: 15px; margin-top: 8px;
    animation: fadein 1.2s ease;
  }
  .loader {
    margin-top: 50px; width: 50px; height: 4px;
    background: #333; border-radius: 4px; overflow: hidden;
  }
  .loader-bar {
    height: 100%; width: 0; background: #FFC107;
    animation: load 2.2s ease forwards;
  }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-12px); } }
  @keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes load { from { width: 0; } to { width: 100%; } }
</style>
</head>
<body>
<div class="logo">⚡</div>
<div class="name">QuickBite</div>
<div class="tagline">Order Fast. Eat Happy.</div>
<div class="loader"><div class="loader-bar"></div></div>
<script>
  setTimeout(() => { window.location.href = 'login.html'; }, 2500);
</script>
</body>
</html>
