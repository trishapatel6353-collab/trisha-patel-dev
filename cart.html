<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Cart</title>
<link rel="stylesheet" href="style.css">
<style>
  .cart-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 20px; border-bottom: 1px solid #f0f0f0;
    background: #fff;
  }
  .item-emoji { font-size: 32px; min-width: 40px; text-align: center; }
  .item-info { flex: 1; }
  .item-name { font-size: 14px; font-weight: 700; }
  .item-price { font-size: 13px; color: #999; margin-top: 2px; }
  .qty-row { display: flex; align-items: center; gap: 10px; }
  .q-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid #e8e8e8; background: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 600; transition: background 0.12s; }
  .q-btn:hover { background: #f5f5f5; }
  .q-num { font-size: 15px; font-weight: 700; min-width: 18px; text-align: center; }
  .items-section { background: #fff; border-top: 1px solid #f0f0f0; margin-bottom: 8px; }
  .checkout-section { margin: 0 20px; }
  .total-card {
    background: #fff; border: 1px solid #e8e8e8; border-radius: 16px;
    padding: 16px 18px; display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 20px;
  }
  .total-label { font-size: 14px; color: #999; }
  .total-val { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
  .items-header { padding: 16px 20px 8px; display: flex; align-items: center; justify-content: space-between; }
  .items-header span { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #aaa; }
  .clear-btn { font-size: 12px; color: #aaa; background: none; border: none; cursor: pointer; font-weight: 600; }
  .clear-btn:hover { color: #0f0f0f; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="menu.html">←</a>
  <h1>Your cart</h1>
  <div></div>
</div>

<div id="cart-content"></div>

<div class="bottomnav">
  <a href="menu.html"><span class="nav-icon">🍽</span>Menu</a>
  <a href="cart.html" class="active"><span class="nav-icon">🛒</span>Cart</a>
  <a href="history.html"><span class="nav-icon">📋</span>Orders</a>
  <a href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
function getCart(){ return JSON.parse(localStorage.getItem('qb_cart')||'[]'); }
function saveCart(c){ localStorage.setItem('qb_cart',JSON.stringify(c)); render(); }

function changeQty(id, d) {
  let cart = getCart();
  const item = cart.find(i=>i.id===id);
  if(item){ item.qty+=d; if(item.qty<=0) cart=cart.filter(i=>i.id!==id); }
  saveCart(cart);
}

function render() {
  const cart = getCart();
  const c = document.getElementById('cart-content');
  if(!cart.length) {
    c.innerHTML = `<div class="empty-state">
      <div class="empty-icon">🛒</div>
      <h3>Your cart is empty</h3>
      <p>Add some food from the menu</p>
      <a class="btn-primary" href="menu.html" style="max-width:200px;margin:0 auto;">Browse menu</a>
    </div>`;
    return;
  }
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  c.innerHTML = `
    <div class="items-section">
      <div class="items-header">
        <span>Order items</span>
        <button class="clear-btn" onclick="if(confirm('Clear cart?')){localStorage.setItem('qb_cart','[]');render();}">Clear all</button>
      </div>
      ${cart.map(i=>`
        <div class="cart-item">
          <div class="item-emoji">${i.emoji}</div>
          <div class="item-info">
            <div class="item-name">${i.name}</div>
            <div class="item-price">₹${i.price} each</div>
          </div>
          <div class="qty-row">
            <button class="q-btn" onclick="changeQty(${i.id},-1)">−</button>
            <span class="q-num">${i.qty}</span>
            <button class="q-btn" onclick="changeQty(${i.id},1)">+</button>
          </div>
        </div>`).join('')}
    </div>
    <div class="checkout-section">
      <div class="total-card">
        <span class="total-label">Total amount</span>
        <span class="total-val">₹${total}</span>
      </div>
      <label>Delivery address</label>
      <textarea id="addr" rows="3" placeholder="Enter your full delivery address..."></textarea>
      <label>Payment method</label>
      <select id="pay">
        <option value="">Select payment method</option>
        <option>Cash on Delivery</option>
        <option>UPI – PhonePe</option>
        <option>UPI – GPay</option>
        <option>Debit / Credit Card</option>
      </select>
      <button class="btn-primary" style="margin-bottom:16px" onclick="placeOrder(${total})">Place order</button>
    </div>`;
}

function placeOrder(total) {
  const addr = document.getElementById('addr').value.trim();
  const pay = document.getElementById('pay').value;
  if(!addr){ alert('Please enter your delivery address.'); return; }
  if(!pay){ alert('Please select a payment method.'); return; }
  const cart = getCart();
  const history = JSON.parse(localStorage.getItem('qb_history')||'[]');
  history.unshift({ id: Date.now(), items: cart, total, address: addr, payment: pay, date: new Date().toLocaleString('en-IN') });
  localStorage.setItem('qb_history', JSON.stringify(history));
  localStorage.setItem('qb_lastOrder', JSON.stringify({ total, address: addr, payment: pay, items: cart }));
  localStorage.setItem('qb_cart','[]');
  window.location.href = 'confirmation.html';
}

render();
</script>
</body>
</html>
