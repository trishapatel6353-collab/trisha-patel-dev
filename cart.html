<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Cart</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #212121; font-family: 'Segoe UI', sans-serif; padding-bottom: 90px; }
  .topbar {
    background: #FFC107; padding: 14px 18px;
    display: flex; align-items: center; gap: 12px;
  }
  .back-btn { background: #212121; color: #FFC107; border: none; border-radius: 8px; padding: 6px 12px; font-size: 18px; cursor: pointer; text-decoration: none; }
  .topbar h1 { color: #212121; font-size: 20px; font-weight: 900; }
  .section { padding: 16px; }
  .section-title { color: #FFC107; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .cart-item {
    background: #2c2c2c; border-radius: 14px; padding: 14px;
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .item-emoji { font-size: 36px; }
  .item-info { flex: 1; }
  .item-name { color: #fff; font-size: 15px; font-weight: 700; }
  .item-price { color: #FFC107; font-size: 14px; margin-top: 3px; }
  .qty-ctrl { display: flex; align-items: center; gap: 10px; }
  .qty-btn {
    background: #FFC107; color: #212121; border: none;
    border-radius: 8px; width: 30px; height: 30px;
    font-size: 18px; font-weight: 900; cursor: pointer;
  }
  .qty-num { color: #fff; font-size: 16px; font-weight: 700; min-width: 20px; text-align: center; }
  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .big { font-size: 60px; }
  .empty-state p { color: #aaa; margin-top: 12px; font-size: 15px; }
  .empty-state a { display: inline-block; margin-top: 18px; background: #FFC107; color: #212121; font-weight: 800; padding: 12px 28px; border-radius: 12px; text-decoration: none; }
  .total-bar {
    background: #2c2c2c; border-radius: 14px; padding: 16px;
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;
  }
  .total-label { color: #aaa; font-size: 15px; }
  .total-amount { color: #FFC107; font-size: 24px; font-weight: 900; }
  label { color: #aaa; font-size: 13px; display: block; margin-bottom: 6px; font-weight: 600; }
  textarea, select {
    width: 100%; padding: 14px; background: #2c2c2c; border: 1.5px solid #444;
    border-radius: 12px; color: #FFC107; font-size: 14px; outline: none;
    margin-bottom: 14px; font-family: inherit;
  }
  textarea:focus, select:focus { border-color: #FFC107; }
  select option { background: #2c2c2c; }
  .btn-order {
    width: 100%; padding: 16px; background: #FFC107; color: #212121;
    border: none; border-radius: 14px; font-size: 17px; font-weight: 900;
    cursor: pointer; letter-spacing: 1px; transition: transform 0.1s;
  }
  .btn-order:active { transform: scale(0.97); }
  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #FFC107; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100;
  }
  .bottombar a { text-decoration: none; color: #212121; font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bottombar a span { font-size: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="menu.html">←</a>
  <h1>🛒 Your Cart</h1>
</div>

<div id="cart-content"></div>

<div class="bottombar">
  <a href="menu.html"><span>🍽</span>Menu</a>
  <a href="cart.html"><span>🛒</span>Cart</a>
  <a href="history.html"><span>📋</span>Orders</a>
  <a href="profile.html"><span>👤</span>Profile</a>
</div>

<script>
function getCart() { return JSON.parse(localStorage.getItem('cart') || '[]'); }
function saveCart(c) { localStorage.setItem('cart', JSON.stringify(c)); render(); }

function changeQty(id, delta) {
  let cart = getCart();
  const item = cart.find(i => i.id === id);
  if (item) { item.qty += delta; if (item.qty <= 0) cart = cart.filter(i => i.id !== id); }
  saveCart(cart);
}

function render() {
  const cart = getCart();
  const container = document.getElementById('cart-content');
  if (cart.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="big">🛒</div>
        <p>Your cart is empty!<br>Add some delicious food.</p>
        <a href="menu.html">Browse Menu</a>
      </div>`;
    return;
  }
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  container.innerHTML = `
    <div class="section">
      <p class="section-title">Order Items</p>
      ${cart.map(i => `
        <div class="cart-item">
          <div class="item-emoji">${i.emoji}</div>
          <div class="item-info">
            <div class="item-name">${i.name}</div>
            <div class="item-price">₹${i.price} × ${i.qty} = ₹${i.price * i.qty}</div>
          </div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty(${i.id}, -1)">−</button>
            <span class="qty-num">${i.qty}</span>
            <button class="qty-btn" onclick="changeQty(${i.id}, 1)">+</button>
          </div>
        </div>`).join('')}
      <div class="total-bar">
        <span class="total-label">Total Amount</span>
        <span class="total-amount">₹${total}</span>
      </div>
    </div>
    <div class="section">
      <p class="section-title">Delivery Details</p>
      <label>Delivery Address</label>
      <textarea id="address" rows="3" placeholder="Enter your full delivery address..."></textarea>
      <label>Payment Method</label>
      <select id="payment">
        <option value="">Select Payment</option>
        <option>Cash on Delivery</option>
        <option>UPI – PhonePe</option>
        <option>UPI – GPay</option>
        <option>Debit/Credit Card</option>
      </select>
      <button class="btn-order" onclick="placeOrder(${total})">PLACE ORDER ✅</button>
    </div>`;
}

function placeOrder(total) {
  const addr = document.getElementById('address').value.trim();
  const pay = document.getElementById('payment').value;
  if (!addr) { alert('Please enter your delivery address!'); return; }
  if (!pay) { alert('Please select a payment method!'); return; }
  // Save order to history
  const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
  const cart = getCart();
  history.unshift({
    id: Date.now(),
    items: cart,
    total,
    address: addr,
    payment: pay,
    date: new Date().toLocaleString('en-IN')
  });
  localStorage.setItem('orderHistory', JSON.stringify(history));
  localStorage.setItem('lastOrder', JSON.stringify({ total, address: addr, payment: pay, items: cart }));
  localStorage.setItem('cart', '[]');
  window.location.href = 'confirmation.html';
}

render();
</script>
</body>
</html>
