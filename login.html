<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Sign In</title>
<link rel="stylesheet" href="style.css">
<style>
  body { background: #fafafa; display: flex; flex-direction: column; justify-content: center; min-height: 100vh; padding: 32px 24px; padding-bottom: 32px; }
  .brand { margin-bottom: 40px; }
  .brand-mark { width: 48px; height: 48px; background: #0f0f0f; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
  .brand h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .brand p { color: #999; font-size: 15px; margin-top: 4px; }
  .tabs { display: flex; background: #f0f0f0; border-radius: 12px; padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 600; color: #999; cursor: pointer; border-radius: 9px; border: none; background: transparent; transition: all 0.2s; }
  .tab.active { background: #fff; color: #0f0f0f; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
  .error-msg { color: #c0392b; font-size: 13px; text-align: center; margin-top: 10px; min-height: 18px; }
  #signup-form { display: none; }
  .forgot { text-align: center; color: #999; font-size: 13px; margin-top: 14px; }
</style>
</head>
<body>
<div class="brand">
  <div class="brand-mark">⚡</div>
  <h1>Welcome back</h1>
  <p>Sign in to your QuickBite account</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('login')">Log in</button>
  <button class="tab" onclick="showTab('signup')">Create account</button>
</div>

<div id="login-form">
  <label>Email</label>
  <input type="email" id="login-email" placeholder="you@example.com" />
  <label>Password</label>
  <input type="password" id="login-pass" placeholder="Your password" />
  <button class="btn-primary" onclick="doLogin()">Log in</button>
  <p class="forgot">Don't have an account? <a href="#" onclick="showTab('signup');return false;" style="color:#0f0f0f;font-weight:600;">Sign up</a></p>
  <div class="error-msg" id="login-error"></div>
</div>

<div id="signup-form">
  <label>Full Name</label>
  <input type="text" id="signup-name" placeholder="Your name" />
  <label>Email</label>
  <input type="email" id="signup-email" placeholder="you@example.com" />
  <label>Password</label>
  <input type="password" id="signup-pass" placeholder="Min. 6 characters" />
  <button class="btn-primary" onclick="doSignup()">Create account</button>
  <div class="error-msg" id="signup-error"></div>
</div>

<script>
function showTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
  });
}
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err = document.getElementById('login-error');
  if (!email || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  const stored = localStorage.getItem('qb_user_' + email);
  if (!stored || stored !== pass) { err.textContent = 'Incorrect email or password.'; return; }
  localStorage.setItem('qb_currentUser', email);
  localStorage.setItem('qb_userName', localStorage.getItem('qb_name_' + email) || email.split('@')[0]);
  window.location.href = 'menu.html';
}
function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const err = document.getElementById('signup-error');
  if (!name || !email || !pass) { err.textContent = 'Please fill in all fields.'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  localStorage.setItem('qb_user_' + email, pass);
  localStorage.setItem('qb_name_' + email, name);
  localStorage.setItem('qb_currentUser', email);
  localStorage.setItem('qb_userName', name);
  window.location.href = 'menu.html';
}
</script>
</body>
</html>
