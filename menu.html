<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Menu</title>
<link rel="stylesheet" href="style.css">
<style>
  .greeting { padding: 20px 20px 0; }
  .greeting p { color: #999; font-size: 13px; }
  .greeting h2 { font-size: 22px; font-weight: 800; letter-spacing: -0.3px; margin-top: 2px; }
  .cats {
    display: flex; gap: 8px;
    padding: 16px 20px; overflow-x: auto; scrollbar-width: none;
  }
  .cats::-webkit-scrollbar { display: none; }
  .cat {
    background: #fff; color: #555; border: 1px solid #e8e8e8;
    border-radius: 30px; padding: 8px 18px; font-size: 13px;
    font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all 0.15s;
  }
  .cat.active { background: #0f0f0f; color: #fff; border-color: #0f0f0f; }
  .food-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 20px; }
  .food-card {
    background: #fff;
    border: 1px solid #e8e8e8;
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .food-card:active { transform: scale(0.96); }
  .food-thumb {
    background: #f5f5f5;
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    font-size: 48px;
  }
  .food-info { padding: 10px 12px 12px; }
  .food-name { font-size: 13px; font-weight: 700; color: #0f0f0f; line-height: 1.3; }
  .food-cat { font-size: 11px; color: #aaa; margin-top: 2px; }
  .food-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .food-price { font-size: 15px; font-weight: 800; }
  .add-btn {
    width: 28px; height: 28px;
    background: #0f0f0f; color: #fff;
    border: none; border-radius: 8px;
    font-size: 20px; line-height: 1;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform 0.1s;
    font-weight: 300;
  }
  .add-btn:active { transform: scale(0.85); }
  .cart-bar {
    position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
    background: #0f0f0f; color: #fff;
    padding: 14px 24px; border-radius: 16px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 32px; font-size: 14px; font-weight: 600;
    cursor: pointer; text-decoration: none;
    width: calc(100% - 40px); max-width: 390px;
    opacity: 0; transition: opacity 0.25s, transform 0.25s;
    z-index: 90; pointer-events: none;
  }
  .cart-bar.visible { opacity: 1; pointer-events: all; }
  .cart-bar-left { display: flex; align-items: center; gap: 10px; }
  .cart-badge { background: #fff; color: #0f0f0f; border-radius: 8px; padding: 3px 9px; font-size: 13px; font-weight: 800; }
  .cart-total { font-size: 16px; font-weight: 800; }
</style>
</head>
<body>

<div class="topbar">
  <h1>QuickBite</h1>
  <div class="topbar-actions">
    <a class="icon-btn" href="profile.html">Profile</a>
  </div>
</div>

<div class="greeting">
  <p>Good day 👋</p>
  <h2>What are you craving?</h2>
</div>

<div class="cats">
  <button class="cat active" onclick="filterCat('All',this)">All</button>
  <button class="cat" onclick="filterCat('Pizza',this)">Pizza</button>
  <button class="cat" onclick="filterCat('Burger',this)">Burger</button>
  <button class="cat" onclick="filterCat('Indian',this)">Indian</button>
  <button class="cat" onclick="filterCat('Drinks',this)">Drinks</button>
  <button class="cat" onclick="filterCat('Desserts',this)">Desserts</button>
  <button class="cat" onclick="filterCat('Sides',this)">Sides</button>
</div>

<div class="food-grid" id="food-grid"></div>
<div class="toast" id="toast">Added to cart</div>

<a class="cart-bar" href="cart.html" id="cart-bar">
  <div class="cart-bar-left">
    <span class="cart-badge" id="cb-count">0</span>
    <span>View cart</span>
  </div>
  <span class="cart-total" id="cb-total">₹0</span>
</a>

<div class="bottomnav">
  <a href="menu.html" class="active"><span class="nav-icon">🍽</span>Menu</a>
  <a href="cart.html"><span class="nav-icon">🛒</span>Cart</a>
  <a href="history.html"><span class="nav-icon">📋</span>Orders</a>
  <a href="profile.html"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
const FOODS = [
  { id:1, name:'Margherita Pizza', cat:'Pizza', price:150, emoji:'🍕' },
  { id:2, name:'Paneer Burger', cat:'Burger', price:120, emoji:'🍔' },
  { id:3, name:'Chicken Burger', cat:'Burger', price:140, emoji:'🍗' },
  { id:4, name:'Dal Makhani', cat:'Indian', price:110, emoji:'🍛' },
  { id:5, name:'Paneer Tikka', cat:'Indian', price:160, emoji:'🔥' },
  { id:6, name:'French Fries', cat:'Sides', price:60, emoji:'🍟' },
  { id:7, name:'Mango Lassi', cat:'Drinks', price:70, emoji:'🥭' },
  { id:8, name:'Gulab Jamun', cat:'Desserts', price:80, emoji:'🍮' },
  { id:9, name:'Veg Pizza', cat:'Pizza', price:130, emoji:'🌿' },
  { id:10, name:'Cold Coffee', cat:'Drinks', price:90, emoji:'☕' },
];

function getCart(){ return JSON.parse(localStorage.getItem('qb_cart')||'[]'); }
function saveCart(c){ localStorage.setItem('qb_cart',JSON.stringify(c)); }

function addToCart(id) {
  const food = FOODS.find(f=>f.id===id);
  let cart = getCart();
  const ex = cart.find(i=>i.id===id);
  if(ex) ex.qty++; else cart.push({...food, qty:1});
  saveCart(cart); updateCartBar(); showToast('Added to cart ✓');
}

function updateCartBar() {
  const cart = getCart();
  const count = cart.reduce((s,i)=>s+i.qty,0);
  const total = cart.reduce((s,i)=>s+i.price*i.qty,0);
  document.getElementById('cb-count').textContent = count;
  document.getElementById('cb-total').textContent = '₹'+total;
  document.getElementById('cart-bar').classList.toggle('visible', count > 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1400);
}

function renderFoods(list) {
  document.getElementById('food-grid').innerHTML = list.map(f=>`
    <div class="food-card">
      <div class="food-thumb">${f.emoji}</div>
      <div class="food-info">
        <div class="food-name">${f.name}</div>
        <div class="food-cat">${f.cat}</div>
        <div class="food-row">
          <span class="food-price">₹${f.price}</span>
          <button class="add-btn" onclick="addToCart(${f.id})">+</button>
        </div>
      </div>
    </div>`).join('');
}

function filterCat(cat, btn) {
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderFoods(cat==='All' ? FOODS : FOODS.filter(f=>f.cat===cat));
}

renderFoods(FOODS);
updateCartBar();
</script>
</body>
</html>
