<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #212121; font-family: 'Segoe UI', sans-serif; padding-bottom: 80px; }
  .topbar { background: #FFC107; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .back-btn { background: #212121; color: #FFC107; border: none; border-radius: 8px; padding: 6px 12px; font-size: 18px; cursor: pointer; text-decoration: none; }
  .topbar h1 { color: #212121; font-size: 20px; font-weight: 900; }
  .avatar-section {
    text-align: center; padding: 32px 20px 20px;
    background: linear-gradient(180deg, #2c2c2c 0%, #212121 100%);
  }
  .avatar { font-size: 72px; }
  .user-name { color: #FFC107; font-size: 22px; font-weight: 900; margin-top: 8px; }
  .user-email { color: #888; font-size: 13px; margin-top: 4px; }
  .stats {
    display: flex; gap: 12px; padding: 16px;
  }
  .stat-card { flex: 1; background: #2c2c2c; border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { color: #FFC107; font-size: 26px; font-weight: 900; }
  .stat-label { color: #aaa; font-size: 11px; margin-top: 4px; }
  .section { padding: 0 16px 16px; }
  .section-title { color: #FFC107; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  label { color: #aaa; font-size: 13px; display: block; margin-bottom: 6px; }
  input {
    width: 100%; padding: 14px; background: #2c2c2c; border: 1.5px solid #444;
    border-radius: 12px; color: #FFC107; font-size: 14px; outline: none;
    margin-bottom: 12px;
  }
  input:focus { border-color: #FFC107; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 800; cursor: pointer; margin-bottom: 10px; transition: transform 0.1s; text-decoration: none; display: block; text-align: center; }
  .btn:active { transform: scale(0.97); }
  .btn-yellow { background: #FFC107; color: #212121; }
  .btn-dark { background: #2c2c2c; color: #FFC107; border: 1.5px solid #444; }
  .btn-red { background: #ff5252; color: #fff; }
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #FFC107; color: #212121; padding: 10px 22px; border-radius: 20px; font-weight: 700; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .bottombar { position: fixed; bottom: 0; left: 0; right: 0; background: #FFC107; display: flex; justify-content: space-around; padding: 10px 0; z-index: 100; }
  .bottombar a { text-decoration: none; color: #212121; font-size: 11px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .bottombar a span { font-size: 20px; }
</style>
</head>
<body>

<div class="topbar">
  <a class="back-btn" href="menu.html">←</a>
  <h1>👤 My Profile</h1>
</div>

<div class="avatar-section">
  <div class="avatar">👤</div>
  <div class="user-name" id="disp-name">Loading...</div>
  <div class="user-email" id="disp-email">...</div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="order-count">0</div>
    <div class="stat-label">Orders</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="total-spent">₹0</div>
    <div class="stat-label">Total Spent</div>
  </div>
  <div class="stat-card">
    <div class="stat-num">⚡</div>
    <div class="stat-label">QuickBite</div>
  </div>
</div>

<div class="section">
  <p class="section-title">Edit Profile</p>
  <label>Your Name</label>
  <input type="text" id="inp-name" placeholder="Enter your name" />
  <label>Phone Number</label>
  <input type="tel" id="inp-phone" placeholder="Enter phone number" />
  <button class="btn btn-yellow" onclick="saveName()">SAVE CHANGES</button>
</div>

<div class="section">
  <p class="section-title">More</p>
  <a class="btn btn-dark" href="history.html">📋 My Order History</a>
  <button class="btn btn-red" onclick="logout()">LOGOUT</button>
</div>

<div class="toast" id="toast">Changes saved! ✅</div>

<div class="bottombar">
  <a href="menu.html"><span>🍽</span>Menu</a>
  <a href="cart.html"><span>🛒</span>Cart</a>
  <a href="history.html"><span>📋</span>Orders</a>
  <a href="profile.html"><span>👤</span>Profile</a>
</div>

<script>
const email = localStorage.getItem('currentUser') || 'guest@quickbite.com';
const name = localStorage.getItem('userName') || email.split('@')[0];
document.getElementById('disp-name').textContent = name;
document.getElementById('disp-email').textContent = email;
document.getElementById('inp-name').value = name;
document.getElementById('inp-phone').value = localStorage.getItem('userPhone') || '';

const history = JSON.parse(localStorage.getItem('orderHistory') || '[]');
document.getElementById('order-count').textContent = history.length;
const spent = history.reduce((s, o) => s + o.total, 0);
document.getElementById('total-spent').textContent = '₹' + spent;

function saveName() {
  const n = document.getElementById('inp-name').value.trim();
  const p = document.getElementById('inp-phone').value.trim();
  if (n) { localStorage.setItem('userName', n); document.getElementById('disp-name').textContent = n; }
  if (p) localStorage.setItem('userPhone', p);
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function logout() {
  if (confirm('Are you sure you want to logout?')) {
    localStorage.removeItem('currentUser');
    localStorage.removeItem('cart');
    window.location.href = 'login.html';
  }
}
</script>
</body>
</html>
