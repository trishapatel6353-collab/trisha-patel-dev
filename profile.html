<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>QuickBite – Profile</title>
<link rel="stylesheet" href="style.css">
<style>
  .profile-hero {
    background: #0f0f0f; padding: 36px 24px 32px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .avatar {
    width: 72px; height: 72px; background: #2a2a2a;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin-bottom: 14px; border: 2px solid #333;
  }
  .profile-hero h2 { color: #fff; font-size: 20px; font-weight: 800; letter-spacing: -0.3px; }
  .profile-hero p { color: #666; font-size: 13px; margin-top: 4px; }
  .stats { display: flex; padding: 16px 20px; gap: 12px; }
  .stat { flex: 1; background: #fff; border: 1px solid #e8e8e8; border-radius: 14px; padding: 14px 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
  .stat-lbl { font-size: 11px; color: #aaa; margin-top: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .menu-list { margin: 0 20px; background: #fff; border: 1px solid #e8e8e8; border-radius: 16px; overflow: hidden; }
  .menu-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid #f5f5f5;
    cursor: pointer; transition: background 0.12s; text-decoration: none; color: #0f0f0f;
  }
  .menu-row:last-child { border-bottom: none; }
  .menu-row:hover { background: #fafafa; }
  .menu-row-left { display: flex; align-items: center; gap: 12px; }
  .menu-icon { width: 36px; height: 36px; background: #f5f5f5; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .menu-label { font-size: 14px; font-weight: 600; }
  .menu-sub { font-size: 12px; color: #aaa; margin-top: 1px; }
  .chevron { color: #ccc; font-size: 16px; }
  .section-gap { height: 20px; }
  .logout-row { color: #c0392b !important; }
  .logout-row .menu-icon { background: #fdf0f0; }
</style>
</head>
<body>

<div class="profile-hero">
  <div class="avatar" id="av">👤</div>
  <h2 id="disp-name">Loading...</h2>
  <p id="disp-email">...</p>
</div>

<div class="stats">
  <div class="stat"><div class="stat-num" id="s-orders">0</div><div class="stat-lbl">Orders</div></div>
  <div class="stat"><div class="stat-num" id="s-spent">₹0</div><div class="stat-lbl">Spent</div></div>
  <div class="stat"><div class="stat-num">⚡</div><div class="stat-lbl">Member</div></div>
</div>

<div class="section">
  <p class="section-label">Edit profile</p>
  <label>Name</label>
  <input type="text" id="inp-name" placeholder="Your name" />
  <label>Phone</label>
  <input type="tel" id="inp-phone" placeholder="+91 00000 00000" />
  <button class="btn-primary" onclick="save()">Save changes</button>
</div>

<div class="section-gap"></div>

<p class="section-label" style="padding:0 20px 10px">Account</p>
<div class="menu-list">
  <a class="menu-row" href="history.html">
    <div class="menu-row-left"><div class="menu-icon">📋</div><div><div class="menu-label">Order history</div><div class="menu-sub">View all your past orders</div></div></div>
    <span class="chevron">›</span>
  </a>
  <div class="menu-row logout-row" onclick="logout()">
    <div class="menu-row-left"><div class="menu-icon">🚪</div><div><div class="menu-label">Log out</div><div class="menu-sub">Sign out of your account</div></div></div>
    <span class="chevron">›</span>
  </div>
</div>

<div class="toast" id="toast">Changes saved</div>

<div class="bottomnav">
  <a href="menu.html"><span class="nav-icon">🍽</span>Menu</a>
  <a href="cart.html"><span class="nav-icon">🛒</span>Cart</a>
  <a href="history.html"><span class="nav-icon">📋</span>Orders</a>
  <a href="profile.html" class="active"><span class="nav-icon">👤</span>Profile</a>
</div>

<script>
const email = localStorage.getItem('qb_currentUser') || '';
const name = localStorage.getItem('qb_userName') || (email ? email.split('@')[0] : 'Guest');
document.getElementById('disp-name').textContent = name;
document.getElementById('disp-email').textContent = email || 'Not signed in';
document.getElementById('inp-name').value = name;
document.getElementById('inp-phone').value = localStorage.getItem('qb_phone') || '';
const history = JSON.parse(localStorage.getItem('qb_history')||'[]');
document.getElementById('s-orders').textContent = history.length;
document.getElementById('s-spent').textContent = '₹' + history.reduce((s,o)=>s+o.total,0);
// Avatar initials
const initials = name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
if(initials.length) document.getElementById('av').textContent = initials;

function save() {
  const n = document.getElementById('inp-name').value.trim();
  const p = document.getElementById('inp-phone').value.trim();
  if(n){ localStorage.setItem('qb_userName',n); document.getElementById('disp-name').textContent=n; }
  if(p) localStorage.setItem('qb_phone',p);
  const t=document.getElementById('toast'); t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),1800);
}
function logout() {
  if(confirm('Log out of QuickBite?')) {
    localStorage.removeItem('qb_currentUser');
    localStorage.setItem('qb_cart','[]');
    window.location.href='login.html';
  }
}
</script>
</body>
</html>
